window:
  padding:
    x: 0
    y: 0

scrolling:
  history: 10000

font: 
  # bold, italic and the rest fallback on normal for font familly
  normal:
    familly: monospace

{{ if eq .Env.HM_VARIANT "FyrePC" }}
  size: 10.5
{{ else }}
  size: 9.5
{{ end }}

  offset:
    x: 0
    y: 0

  glyph_offset:
    x: 0
    y: 0

draw_bold_text_with_bright_colors: false

background_opacity: 0.8

live_config_reload: true

shell:
  program: /bin/bash
  args:
    - --login

