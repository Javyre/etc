# ==== ENV ==== #
[tasks.env__xps15]
envs = [['XDGC', '.local/etc'],
        ['XDGD', '.local/share']]
[tasks.env__FyrePC]
envs = [['XDGC', '.local/etc'],
        ['XDGD', '.local/share']]

# ==== CFG ==== #
[tasks.cfg__common]
deps = ['env']
templates = [
    ['$XDGC/alacritty.yml'  , 'alacritty.yml'  ],
    ['$XDGC/isync/mbsyncrc' , 'isync/mbsyncrc' ],
]
links = [
    ['$XDGC/nvim'          , 'nvim'          ],
    ['$XDGC/vim'           , 'vim'           ],
    ['$XDGC/tmux'          , 'tmux'          ],
    ['$XDGC/shell'         , 'shell'         ],
    ['$XDGC/root'          , 'root'          ],
    ['$XDGC/i3'            , 'i3'            ],
    ['$XDGC/picom'         , 'picom'         ],
    ['$XDGC/polybar'       , 'polybar'       ],
    ['$XDGC/rofi'          , 'rofi'          ],
    ['$XDGC/X11'           , 'X11'           ],
    ['$XDGC/git'           , 'git'           ],
    ['.local/bin/s'        , 's'             ],
]

[tasks.cfg__xps15]
deps = ['cfg__common']

[tasks.cfg__FyrePC]
deps = ['cfg__common']

# ==== DFT ==== #
[tasks.default]
deps = ['cfg']
